<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Formulário de Cadastro</title>
</head>

<body class="container">
   
    <h1>Cadastro de viajantes</h1>
    <form action="#" method="post" enctype="multipart/form-data">
        <!-- Dados pessoais -->
        <fieldset class="form-control mb-3">
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome Completo</label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu nome"
                title="Digite seu nome completo sem abreviações" class="form-control" required>
            <label for="idade">idade</label>
            <input type="number" name="idade" id="idade" class="form-control" placeholder="Digite sua idade" onchange="verificarIdade()" required>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>Contato</legend>
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="exemplo@gmail.com" class="form-control" required>
            <label for="telefone">Telefone</label>
            <input type="tel" name="telefone" id="telefone" class="form-control" placeholder="(21)99999-9999"
                pattern="^\(\d{2}\1\)d{5}-\d{4}$" title="Formato:(21)99999-9999">
        </fieldset>
        <fieldset class="form control mb-3">
            <legend>Preferência de viagens</legend>
            <label for="destino">Destino</label>
            <input type="text" name="destino" id="destino" class="form-control" placeholder="Ex: Paris, NY, istanbul">
            <label for="tipo">Tipo</label>
            <select name="tipo" id="tipo" class="form-control">
                <option value="praia">Praia</option>
                <option value="aventura">Aventura</option>
                <option value="romantico">Romântico</option>
                <option value="cultural">Cultural</option>
            </select>
            <label for="dataIda">Data de ida</label>
            <input type="date" name="dataIda" id="dataIda" class="form-control">
            <label for="dataVolta">Data de volta</label>
            <input type="date" name="dataVolta" id="dataVolta" class="form-control">
            <p>Deseja receber promoções de viagem?</p>
            <input type="radio" name="promo" id="sim" value="sim"><label for="sim">Sim</label>
            <input type="radio" name="promo" id="nao" value="nao"><label for="nao">Não</label>
        </fieldset>
        <fieldset class="form-control mb-3">
            <legend>Outros</legend>
            <label for="passaporte">Upload de passaporte (opcional)</label>
            <input type="file" name="passaporte" id="passaporte" class="form-control">
            <label for="cor">Cor favorita para tema de viagem</label>
            <input type="color" name="cor" id="cor" class="form-control">
            <p>Hobbies</p>
            <input type="checkbox" name="hobbies1" id="revista">
            <label for="revista">Revista</label><br>
            <input type="checkbox" name="hobbies2" id="jornal">
            <label for="jornal">Jornal</label>

        </fieldset>

        <button type="submit" class="btn btn-outline-primary">Cadastrar</button>
        <button class="btn btn-outline-danger" type="reset">Limpar</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script> 
        <script src="js/script.js"></script>
</body>

</html>
