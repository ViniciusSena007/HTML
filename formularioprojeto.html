<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>
    <main class="container">
        <h1>Agendamento de visita</h1>
        <form action="#">
            <fieldset>
                <legend>Dados de contato</legend>
                <label for="Nome">Nome Completo</label>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome" class="form-control" required>
                <label for="telefone">Telefone</label>
                <input type="tel" name="telefone" id="telefone" placeholder="Ex: 21 99999-9999" class="form-control" required> 
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="example@gmail.com" required>
            </fieldset>
            <fieldset>
                <legend>Endereço</legend>
                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" class="form-control" maxlength="9">
                <label for="cidade">Cidade</label>
                <input type="text" name="cidade" id="cidade" class="form-control">
                <label for="bairro">Bairro</label>
                <input type="text" name="bairro" id="bairro" class="form-control">
                <label for="rua">Rua</label>
                <input type="text" name="rua" id="rua" class="form-control">
            </fieldset>
            <fieldset>
                <div class="container-sm">
                <legend>Dia da Visita</legend>
                <label for="dataIda">Data da visita</label>
                <input type="date" name="dataIda" id="dataIda" class="form-control">
                <label for="dtAlterntiva">Data Alternativa</label>
                <input type="date" name="dtAlterntiva" id="dtAlterntiva" class="form-control">
            </div>
            </fieldset>
            <button type="button" class="btn btn-outline-primary">Agendar</button>
            <button type="button" class="btn btn-outline-danger">Cancelar</button>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
